<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A semantic HTML5 page with navigation, article, image, and footer.">
    <title>My Semantic HTML5 Page</title>
</head>
<body>
    <!-- Navigation -->
    <header>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">About</a></li>
                <li><a href="#">Blog</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>
    </header>

    <!-- Main Content -->
    <main>
        <article>
            <h1>Welcome to My Page</h1>
            <p>This is a sample article demonstrating semantic HTML5 structure.</p>
            <img src="https://via.placeholder.com/400x200" alt="Sample placeholder image">
        </article>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Your Name. All rights reserved.</p>
    </footer>
</body>
</html>
